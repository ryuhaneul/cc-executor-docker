services:
  cc-executor:
    build: .
    container_name: cc-executor
    restart: unless-stopped
    ports:
      - "${CC_PORT:-9100}:9100"
    environment:
      - CC_API_KEY=${CC_API_KEY}
      - CC_TIMEOUT=${CC_TIMEOUT:-300}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - CC_CODEX_ALLOW_DANGER_FULL_ACCESS=${CC_CODEX_ALLOW_DANGER_FULL_ACCESS:-false}
      - CC_CODEX_REQUIRE_USER_AUTH=${CC_CODEX_REQUIRE_USER_AUTH:-false}
      - CODEX_DEFAULT_MODEL=${CODEX_DEFAULT_MODEL:-gpt-5.2-codex}
    volumes:
      - cc-auth:/root/.claude
      - codex-auth:/root/.codex

volumes:
  cc-auth:
  codex-auth:
